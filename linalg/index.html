<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Roboto:wght@100;500&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linear Algebra</title>
</head>
<body class="bg-black text-white">
  <div id="root" class="text-center flex flex-col justify-between h-full">
    <div class="flex justify-between p-4 pb-0 text-2xl">
      <div class="flex w-2 border-2 border-r-0 border-white"></div>
      <div class="grid grid-cols-3 justify-between grow gap-3 py-2"
           id="matrix">
        <div>12</div>
        <div>14</div>
        <div>2</div>
        <div>5</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>2</div>
        <div>0</div>
      </div>
      <div class="flex w-2 border-2 border-l-0 border-white"></div>
    </div>
    <div class="flex justify-around mb-4 text-xs"
         id="menu">
  
      <button name="settings" class="">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">

          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
      <button name="newMatrix">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>

      </button>
    </div>
    <div>Calcule o determinante da matriz</div>
    <div class="m-4 mx-8 p-4 border-white border border-opacity-70 text-2xl"
         id="display">710</div>
    <div class="grid grid-cols-3 text-center gap-2 m-2"
         id="numpad">
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">1</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">2</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">3</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">4</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">5</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">6</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">7</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">8</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">9</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">0</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">-</div>
      <div class="p-5 rounded-sm border border-white border-opacity-30 active:bg-blue-500 cursor-pointer">back</div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
